<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BayBuddy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
  .widget { background: #111; border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; border: 0.5px solid #222; }
  .header { background: #1a1a1a; padding: 18px 24px; border-bottom: 0.5px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 600; color: #D4A800; }
  .tagline { font-size: 12px; color: #555; margin-top: 2px; }
  .live-badge { background: #1f1f00; border: 0.5px solid #3a3000; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #D4A800; }
  .body { padding: 24px; }
  .section-label { font-size: 11px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .session-card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-label { font-size: 11px; color: #555; margin-bottom: 3px; }
  .field-value { font-size: 14px; font-weight: 500; color: #e8e8e8; }
  .field-value.gold { color: #D4A800; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; cursor: pointer; user-select: none; }
  .toggle-label { font-size: 14px; font-weight: 500; color: #e8e8e8; }
  .toggle-sub { font-size: 12px; color: #555; margin-top: 2px; }
  .switch { width: 44px; height: 24px; background: #2a2a2a; border-radius: 12px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .switch.on { background: #D4A800; }
  .switch-knob { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform 0.2s; }
  .switch.on .switch-knob { transform: translateX(20px); }
  .filter-section { margin-bottom: 20px; }
  .filter-label { font-size: 11px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 0.5px solid #2a2a2a; background: #1a1a1a; color: #888; white-space: nowrap; }
  .chip:hover { border-color: #D4A800; color: #D4A800; }
  .chip.active { background: #D4A800; color: #111; border-color: #D4A800; }
  .notice-box { background: #1f1f00; border: 0.5px solid #3a3000; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .notice-text { font-size: 13px; color: #D4A800; line-height: 1.5; }
  .invite-panel { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .invite-hint { font-size: 12px; color: #555; margin-bottom: 14px; }
  .member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #222; cursor: pointer; }
  .member-row:last-child { border-bottom: none; padding-bottom: 0; }
  .member-row.no-cursor { cursor: default; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #888; flex-shrink: 0; transition: all 0.15s; }
  .avatar.selected { background: #3a2e00; color: #D4A800; }
  .avatar.circle-av { background: #001f3f; color: #60a5fa; }
  .member-info
