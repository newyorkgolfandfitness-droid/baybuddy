<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SessionLink</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
  .widget { background: #111; border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; border: 0.5px solid #222; }
  .header { background: #1a1a1a; padding: 18px 24px; border-bottom: 0.5px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 600; color: #D4A800; }
  .tagline { font-size: 12px; color: #555; margin-top: 2px; }
  .live-badge { background: #1f1f00; border: 0.5px solid #3a3000; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #D4A800; }
  .body { padding: 24px; }
  .section-label { font-size: 11px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .session-card { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-label { font-size: 11px; color: #555; margin-bottom: 3px; }
  .field-value { font-size: 14px; font-weight: 500; color: #e8e8e8; }
  .field-value.gold { color: #D4A800; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; cursor: pointer; user-select: none; }
  .toggle-label { font-size: 14px; font-weight: 500; color: #e8e8e8; }
  .toggle-sub { font-size: 12px; color: #555; margin-top: 2px; }
  .switch { width: 44px; height: 24px; background: #2a2a2a; border-radius: 12px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .switch.on { background: #D4A800; }
  .switch-knob { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: transform 0.2s; }
  .switch.on .switch-knob { transform: translateX(20px); }
  .invite-panel { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: none; }
  .invite-hint { font-size: 12px; color: #555; margin-bottom: 14px; }
  .member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #222; cursor: pointer; }
  .member-row:last-child { border-bottom: none; padding-bottom: 0; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #888; flex-shrink: 0; transition: all 0.15s; }
  .avatar.selected { background: #3a2e00; color: #D4A800; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; color: #ccc; }
  .member-hcp { font-size: 12px; color: #555; }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 0.5px solid #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 12px; }
  .checkbox.checked { background: #D4A800; border-color: #D4A800; color: #111; }
  .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: #D4A800; color: #111; }
  .btn:hover { background: #e8b800; }
  .btn:disabled { background: #2a2a2a; color: #444; cursor: default; }
  .confirm { background: #0f2a1a; border: 0.5px solid #1a5a30; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: none; align-items: flex-start; gap: 10px; }
  .confirm-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .confirm-text { font-size: 13px; color: #4ade80; line-height: 1.5; }
  .error-msg { background: #2a0f0f; border: 0.5px solid #5a1a1a; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: none; font-size: 13px; color: #f87171; }
  .sending-bar { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: none; align-items: center; gap: 12px; }
  .spinner { width: 16px; height: 16px; border: 2px solid #333; border-top-color: #D4A800; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sending-text { font-size: 13px; color: #666; }
  .footer { text-align: center; margin-top: 16px; font-size: 11px; color: #333; }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div>
      <div class="logo">BayBuddy</div>
      <div class="tagline">Play better together</div>
    </div>
    <div class="live-badge">● Live</div>
  </div>
  <div class="body">
    <div class="section-label">Your session</div>
    <div class="session-card">
      <div><div class="field-label">Bay</div><div class="field-value gold">Empire Bay</div></div>
      <div><div class="field-label">Member</div><div class="field-value">Mike</div></div>
      <div><div class="field-label">Date</div><div class="field-value" id="session-date"></div></div>
      <div><div class="field-label">Time</div><div class="field-value">4:00 – 5:30 PM</div></div>
    </div>

    <div class="section-label">Session type</div>
    <div class="toggle-row" id="toggle-row" onclick="toggleOpen()">
      <div>
        <div class="toggle-label">Open this session to others</div>
        <div class="toggle-sub" id="toggle-sub">Solo session — only you</div>
      </div>
      <div class="switch" id="switch"><div class="switch-knob"></div></div>
    </div>

    <div class="invite-panel" id="invite-panel">
      <div class="invite-hint">Select members to invite</div>
      <div id="member-list"><div style="text-align:center;padding:20px;font-size:13px;color:#555;">Loading members...</div></div>
    </div>

    <div class="sending-bar" id="sending-bar">
      <div class="spinner"></div>
      <div class="sending-text" id="sending-text">Sending invites...</div>
    </div>

    <div class="confirm" id="confirm">
      <div class="confirm-icon">✓</div>
      <div class="confirm-text" id="confirm-text"></div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn" id="main-btn" onclick="handleSubmit()">Confirm booking</button>
    <div class="footer">Powered by BayBuddy</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://bdedqplcpjlesgqotllm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkZWRxcGxjcGpsZXNncW90bGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjM0MDgsImV4cCI6MjA5NDkzOTQwOH0.BlvMj0NUJAbAFGatsnTF0n0_Fr0zABG9BrN-fh0KEZI';
  const FACILITY_ID = '00000000-0000-0000-0000-000000000001';
  const FACILITY_NAME = 'New York Golf & Fitness';
  const HOST_NAME = 'Mike';
  const BAY_NAME = 'Empire Bay';

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let isOpen = false;
  let members = [];
  let selected = {};
  let submitted = false;

  const d = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('session-date').textContent = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  function formatTime(t) {
    const [h,m] = t.split(':');
    const hr = parseInt(h);
    return (hr % 12 || 12) + ':' + m + ' ' + (hr >= 12 ? 'PM' : 'AM');
  }

  async function loadMembers() {
    const { data, error } = await db.from('members').select('*').eq('facility_id', FACILITY_ID).neq('name', HOST_NAME);
    if (error) { document.getElementById('member-list').innerHTML = '<div style="text-align:center;padding:20px;font-size:13px;color:#f87171;">Failed to load members</div>'; return; }
    members = data;
    const list = document.getElementById('member-list');
    if (!members.length) { list.innerHTML = '<div style="text-align:center;padding:20px;font-size:13px;color:#555;">No members found</div>'; return; }
    list.innerHTML = members.map(m => {
      const initials = m.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      return `<div class="member-row" onclick="toggleMember('${m.id}')">
        <div class="avatar" id="av-${m.id}">${initials}</div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-hcp">${m.handicap != null ? 'Handicap: '+m.handicap : 'Member'}</div>
        </div>
        <div class="checkbox" id="cb-${m.id}"></div>
      </div>`;
    }).join('');
  }

  function toggleMember(id) {
    if (submitted) return;
    selected[id] = !selected[id];
    const cb = document.getElementById('cb-'+id);
    const av = document.getElementById('av-'+id);
    cb.className = 'checkbox' + (selected[id] ? ' checked' : '');
    cb.textContent = selected[id] ? '✓' : '';
    av.className = 'avatar' + (selected[id] ? ' selected' : '');
    updateBtn();
  }

  function toggleOpen() {
    if (submitted) return;
    isOpen = !isOpen;
    document.getElementById('switch').className = 'switch' + (isOpen ? ' on' : '');
    document.getElementById('toggle-sub').textContent = isOpen ? 'Open — selected members will be notified' : 'Solo session — only you';
    document.getElementById('invite-panel').style.display = isOpen ? 'block' : 'none';
    updateBtn();
  }

  function updateBtn() {
    const count = Object.values(selected).filter(Boolean).length;
    const btn = document.getElementById('main-btn');
    if (!isOpen) { btn.textContent = 'Confirm booking'; return; }
    btn.textContent = count > 0 ? 'Send invites to ' + count + ' player' + (count > 1 ? 's' : '') : 'Send invites';
  }

  async function handleSubmit() {
    if (submitted) return;
    submitted = true;
    const btn = document.getElementById('main-btn');
    btn.disabled = true;

    const today = new Date().toISOString().split('T')[0];
    const dateLabel = days[new Date().getDay()] + ', ' + months[new Date().getMonth()] + ' ' + new Date().getDate();

    const { data: sessionData, error: sessionError } = await db.from('sessions').insert({
      facility_id: FACILITY_ID,
      host_member_id: null,
      bay_name: BAY_NAME,
      session_date: today,
      start_time: '16:00:00',
      end_time: '17:30:00',
      is_open: isOpen
    }).select().single();

    if (sessionError) { showError('Session save failed: ' + sessionError.message); submitted = false; btn.disabled = false; return; }

    const invitedMembers = members.filter(m => selected[m.id]);

    if (isOpen && invitedMembers.length > 0) {
      const inviteRows = invitedMembers.map(m => ({ session_id: sessionData.id, invited_member_id: m.id, status: 'pending' }));
      const { data: inviteData, error: inviteError } = await db.from('invites').insert(inviteRows).select();
      if (inviteError) { showError('Invite save failed: ' + inviteError.message); submitted = false; btn.disabled = false; return; }

      document.getElementById('sending-bar').style.display = 'flex';
      document.getElementById('sending-text').textContent = 'Sending invites...';
      btn.textContent = 'Sending...';

      let sent = 0;
      for (let i = 0; i < invitedMembers.length; i++) {
        const member = invitedMembers[i];
        const invite = inviteData[i];
        document.getElementById('sending-text').textContent = `Sending to ${member.name}...`;
        try {
          await fetch('/api/send-invite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              inviteId: invite.id,
              memberName: member.name,
              memberEmail: member.email,
              hostName: HOST_NAME,
              bayName: BAY_NAME,
              sessionDate: dateLabel,
              startTime: formatTime('16:00:00'),
              endTime: formatTime('17:30:00'),
              facilityName: FACILITY_NAME
            })
          });
          sent++;
        } catch(e) { console.error('Email failed for', member.name, e); }
      }

      document.getElementById('sending-bar').style.display = 'none';
      const names = invitedMembers.map(m => m.name).join(', ');
      showConfirm(`Session is open! Invites sent to ${names}. They'll receive an email to accept or decline.`);
      btn.textContent = 'Invites sent ✓';
    } else {
      showConfirm('Booking confirmed. See you at ' + BAY_NAME + '!');
      btn.textContent = 'Booked ✓';
    }
  }

  function showConfirm(msg) {
    const el = document.getElementById('confirm');
    document.getElementById('confirm-text').textContent = msg;
    el.style.display = 'flex';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    submitted = false;
    document.getElementById('main-btn').disabled = false;
    document.getElementById('sending-bar').style.display = 'none';
  }

  loadMembers();
</script>
</body>
</html>
